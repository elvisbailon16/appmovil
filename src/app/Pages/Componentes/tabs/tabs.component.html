<ion-tabs>
  <ion-tab-bar slot="bottom" style="--background: #005846; --color: rgb(255, 255, 255); --color-selected: #44D62C;">
    <ion-tab-button tab="home">
      <ion-icon  name="home" color="white"></ion-icon>
      <ion-label>Home</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="eventos">
      <ion-icon name="calendar-outline"></ion-icon>
      <ion-label>Eventos</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="QR">
      <ion-icon name="qr-code-outline"></ion-icon>
      <ion-label>QR</ion-label>

    <ion-tab-button tab="wallet">
      <ion-icon name="wallet-outline"></ion-icon>
