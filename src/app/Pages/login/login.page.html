
<ion-content [fullscreen]="true">
 <div class="login-container">
  <!-- Header Section -->
  <div class="login-header">
    <div class="brand-title">TerriMeet</div>
    <div class="brand-subtitle">ESPAM MFL</div>
  </div>

  <!-- Form Section -->
  <div class="login-body">
    <h1 class="login-title">Iniciar sesión</h1>

    <!-- Email Field -->
    <div class="form-group">
      <label class="form-label">Email</label>
      <div class="input-wrapper">
        <ion-icon class="input-icon" name="mail-outline"></ion-icon>
        <input 
          class="form-input" 
          type="email" 
          placeholder="tunombre@espam.edu.ec"
        />
      </div>
    </div>

    <!-- Password Field -->
    <div class="form-group">
      <label class="form-label">Contraseña</label>
      <div class="input-wrapper">
        <ion-icon class="input-icon" name="lock-closed-outline"></ion-icon>
        <input 
          class="form-input" 
          type="password" 
          placeholder="••••••••"
        />
      </div>
    </div>

    <!-- Actions Row -->
    <div class="actions-row">
      <label class="remember-me">
        <input type="checkbox" />
        <span>Recordar</span>
      </label>
      <a class="forgot-link" href="#">¿Olvidaste tu contraseña?</a>
    </div>

    <!-- Primary Button -->
    <button (click)="login()" class="btn-primary">
      <span >Iniciar sesión</span>
      <ion-icon name="arrow-forward"></ion-icon>
    </button>

    <!-- Secondary Button -->
    <button class="btn-secondary">
      <span>Microsoft</span>
    </button>

    <!-- Register Link -->
    <p class="register-text">
      ¿No tienes cuenta? <a href="#">Regístrate</a>
    </p>
  </div>
</div>
</ion-content>
