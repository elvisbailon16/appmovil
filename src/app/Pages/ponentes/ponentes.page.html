<!-- ponentes.page.html -->
<app-cabecera [titulo]="'Ponentes'"></app-cabecera>

<ion-content>

  <!-- Header decorativo -->
  <div class="ponentes-header">
    <ion-icon name="mic-outline"></ion-icon>
    <h2>Ponentes</h2>
    <p>¡Conoce a los ponentes!</p>
  </div>

  <!-- Cargando -->
  @if (cargando) {
    <div class="estado-center">
      <ion-spinner name="crescent"></ion-spinner>
      <p>Cargando ponentes...</p>
    </div>
  }

  <!-- Error -->
  @if (error && !cargando) {
    <div class="estado-center">
      <ion-icon name="cloud-offline-outline"></ion-icon>
      <p>{{ error }}</p>
      <button class="btn-retry" (click)="cargarPonentes()">Reintentar</button>
    </div>
  }

  <!-- Lista -->
  @if (!cargando && !error) {
    <div class="ponentes-list">
      @for (ponente of ponentes; track ponente.idponente) {
        <app-ponente-card [ponente]="ponente"></app-ponente-card>
      }

      @empty {
        <div class="estado-center">
          <ion-icon name="people-outline"></ion-icon>
          <p>No hay ponentes registrados.</p>
        </div>
      }
    </div>
  }

</ion-content>
